<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozone Lounge Kilimani</title>
    <style>
        @keyframes glitter {
            0% { text-shadow: 0px 0px 5px #fff, 0px 0px 10px #ff0, 0px 0px 15px #ff4500; }
            50% { text-shadow: 0px 0px 10px #ff4500, 0px 0px 20px #ff0, 0px 0px 25px #ff4500; }
            100% { text-shadow: 0px 0px 5px #fff, 0px 0px 10px #ff0, 0px 0px 15px #ff4500; }
        }

        @keyframes border-glow {
            0% { border-color: #ff0; box-shadow: 0 0 10px #ff0; }
            50% { border-color: #ff4500; box-shadow: 0 0 20px #ff4500; }
            100% { border-color: #ff0; box-shadow: 0 0 10px #ff0; }
        }


*{
    padding: 0;
    margin: 0;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            background: linear-gradient(45deg, #ff0, #ff4500, #ff0);
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 2.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: glitter 2s infinite alternate, border-glow 2s infinite alternate;
            border: 5px solid;
            display: inline-block;
            margin-top: 20px;
        }

        h2 {
            background: linear-gradient(90deg, #ff4500, #ff0);
            color: #222;
            padding: 10px;
            border-radius: 10px;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0px 0px 10px rgba(255, 255, 0, 0.7);
        }

        .section {
            margin: 30px 0;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .images {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .images img {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 10px;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .images img:hover {
            transform: scale(1.1);
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.5);
        }
        .footer {
            background-color: #111;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
            width: 100%;
            color: #ff0;
            font-size: 1.2rem;
        }

        .footer a {
            color: #ff4500;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }


        @media (max-width: 768px) {
            .images img {
                max-width: 100%;
                border-radius: 15px;
            }
            h1 {
                font-size: 2.2rem;
                padding: 15px;
            }
            h2 {
                font-size: 1.5rem;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ozone lounge</h1>
        
        <div class="section">
            <h2>FOODS</h2>
            <div class="images">
                <img src="pics/1.png" alt="Food 1">
                <img src="pics/2.png" alt="Food 2">
                <img src="pics/3.png" alt="Food 3">
                <img src="pics/4.png" alt="Food 4">
                <img src="pics/5.png" alt="Food 5">
            </div>
        </div>
        
        <div class="section">
            <h2>DRINKS</h2>
            <div class="images">
                <img src="pics/1 (1).png" alt="Drink 1">
                <img src="pics/2 (1).png" alt="Drink 1">
                <img src="pics/3 (1).png" alt="Drink 1">
                <img src="pics/4 (1).png" alt="Drink 1">
                <img src="pics/5 (1).png" alt="Drink 1">
                <img src="pics/6.png" alt="Drink 1">
                <img src="pics/7.png" alt="Drink 1">
                <img src="pics/8.png" alt="Drink 1">
                <img src="pics/9.png" alt="Drink 1">
                <img src="pics/10.png" alt="Drink 1">
                <img src="pics/11.png" alt="Drink 1">
            </div>
        </div>
        


        <footer class="footer">
        
            <p>&copy; 2025 Ozone lounge. All rights reserved.</p>
        </footer>


    </div>
</body>
</html>
